<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏝️ Catan Leaderboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Poppins:wght@400;600;700&display=swap');

:root {
  --text: #fff5e1;
  --glass: rgba(255, 255, 255, 0.12);
  --gold: #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
  --accent: #ff7f50; /* Catan Brick Red */
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  background-color: #1a1a1a;
}

/* Background Setup */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background.png') center/cover no-repeat;
  z-index: -3;
}

.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
  z-index: -1;
  pointer-events: none;
}

h1 {
  text-align: center;
  margin: 40px 0 10px;
  font-family: 'MedievalSharp', cursive;
  font-size: 3.5rem;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

#previous-season {
  text-align: center;
  margin-bottom: 25px;
  font-size: 1.1rem;
}

/* Table Container */
.leaderboard-container {
  width: 90%;
  max-width: 900px;
  margin: 0 auto 50px;
  background: var(--glass);
  border-radius: 20px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden; /* Keeps the rounded corners */
}

/* Responsive Table Scroll */
.table-wrapper {
  overflow-x: auto;
}

table { 
  width: 100%; 
  border-collapse: collapse; 
}

th {
  background: rgba(0,0,0,0.3);
  padding: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.8rem;
}

td { 
  padding: 16px; 
  text-align: center; 
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

tbody tr {
  transition: all 0.2s ease;
  cursor: pointer;
}

tbody tr:hover {
  background: rgba(255,255,255,0.08);
  transform: scale(1.01);
}

/* Rank Styling */
.rank-1 td:nth-child(2) { color: var(--gold); font-weight: 700; font-size: 1.1rem; }
.rank-2 td:nth-child(2) { color: var(--silver); }
.rank-3 td:nth-child(2) { color: var(--bronze); }

/* Player Detail Panel */
#player-panel {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 300px;
  background: rgba(20, 20, 20, 0.95);
  padding: 25px;
  border-radius: 20px;
  border: 2px solid var(--accent);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: none;
  z-index: 100;
}

#player-panel h3 { margin-top: 0; color: var(--accent); font-family: 'MedievalSharp'; font-size: 1.8rem; }
.stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }

.close-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px 15px;
  border-radius: 5px;
  cursor: pointer;
  width: 100%;
  margin-top: 15px;
  font-weight: bold;
}

footer { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.8rem; }

/* Mobile optimization */
@media (max-width: 768px) {
  h1 { font-size: 2rem; }
  .leaderboard-container { width: 95%; }
  #player-panel {
    width: 85%;
    right: 5%;
    left: 5%;
    top: 50%;
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<h1>🏝️ Catan Leaderboard</h1>
<div id="previous-season"></div>

<div class="leaderboard-container">
  <div class="table-wrapper">
    <table id="leaderboard-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Score (Top 3)</th>
          <th>Games Played</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </div>
</div>

<div id="player-panel"></div>

<footer>
  April Season Progress | Last synced: <span id="update-time"></span>
</footer>

<script>
// --- CONFIG ---
const APRIL_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2PbXFjzjLBgwjIMQiwXnynRhglLmTubZzm8nQG8nibfo3kJqiR-tucGdMCr6Rm-5KBhhrySF2oVB/pub?gid=1497877429&single=true&output=csv";
const NOVEMBER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2PbXFjzjLBgwjIMQiwXnynRhglLmTubZzm8nQG8nibfo3kJqiR-tucGdMCr6Rm-5KBhhrySF2oVB/pub?gid=0&single=true&output=csv";

let playerStats = {};

async function fetchCSV(url) {
  try {
    const res = await fetch(url + "&t=" + new Date().getTime());
    const text = await res.text();
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h=>h.trim());
    const rows = lines.slice(1).map(r=>r.split(",").map(v=>v.trim()));
    return { headers, rows };
  } catch (e) {
    console.error("Fetch failed", e);
    return null;
  }
}

function getArchetype(p) {
  if (p.armyCount > p.roadCount && p.armyCount >= 2) return "⚔️ Warlord";
  if (p.roadCount > p.armyCount && p.roadCount >= 2) return "🚧 Road King";
  if ((p.totalVP / p.games) >= 8) return "🧱 Master Builder";
  return "🤝 Clever Trader";
}

function showPlayer(name) {
  const p = playerStats[name];
  const winRate = ((p.wins/p.games)*100).toFixed(1);
  const avgVP = (p.totalVP/p.games).toFixed(1);
  const h2h = Object.entries(p.opponents).slice(0,3) // Top 3 rivals
    .map(([opp,rec])=>`<div class="stat-row"><span>vs ${opp}</span><span>${rec.wins}W - ${rec.losses}L</span></div>`)
    .join("");

  const panel = document.getElementById("player-panel");
  panel.innerHTML = `
    <h3>${name}</h3>
    <div style="color:var(--accent); margin-bottom:15px; font-weight:bold;">${getArchetype(p)}</div>
    <div class="stat-row"><span>Total Games</span><span>${p.games}</span></div>
    <div class="stat-row"><span>Win Rate</span><span>${winRate}%</span></div>
    <div class="stat-row"><span>Avg Victory Points</span><span>${avgVP}</span></div>
    <div class="stat-row"><span>Specialty Cards</span><span>🚧 ${p.roadCount} | 🛡️ ${p.armyCount}</span></div>
    <h4 style="margin: 15px 0 5px 0; font-size:0.9rem; opacity:0.7;">Rivalries</h4>
    ${h2h}
    <button class="close-btn" onclick="hidePanel()">Back to Board</button>
  `;
  panel.style.display="block";
}

function hidePanel() {
  document.getElementById("player-panel").style.display="none";
}

async function loadLeaderboard() {
  const data = await fetchCSV(APRIL_SHEET_URL);
  if(!data) return;
  const { headers, rows } = data;

  playerStats = {};
  const matches = {};
  const playersMap = {};

  rows.forEach(row => {
    const mId = row[headers.indexOf("Match_ID")];
    const name = row[headers.indexOf("Player_Name")];
    const pos = parseInt(row[headers.indexOf("Position")])||0;
    const vp = parseInt(row[headers.indexOf("VP")])||0;
    const road = parseInt(row[headers.indexOf("Longest_Road")])||0;
    const army = parseInt(row[headers.indexOf("Largest_Army")])||0;
    
    let score = vp + (pos===1?3:pos===2?2:pos===3?1:0) + road + army;

    if (!matches[mId]) matches[mId]=[];
    matches[mId].push({name, pos, vp, road, army, score});

    if (!playersMap[name]) playersMap[name]={name, scores:[], games:0};
    playersMap[name].scores.push(score);
    playersMap[name].games++;
  });

  // Calculate detailed stats
  Object.values(matches).forEach(m => {
    m.forEach(p1 => {
      if (!playerStats[p1.name]) playerStats[p1.name] = { games:0, wins:0, totalVP:0, roadCount:0, armyCount:0, opponents:{} };
      const s = playerStats[p1.name];
      s.games++;
      s.totalVP += p1.vp;
      if (p1.pos === 1) s.wins++;
      if (p1.road) s.roadCount++;
      if (p1.army) s.armyCount++;

      m.forEach(p2 => {
        if (p1.name !== p2.name) {
          if (!s.opponents[p2.name]) s.opponents[p2.name] = {wins:0, losses:0};
          p1.pos < p2.pos ? s.opponents[p2.name].wins++ : s.opponents[p2.name].losses++;
        }
      });
    });
  });

  const displayList = Object.values(playersMap).map(p => ({
    name: p.name,
    total: p.scores.sort((a,b)=>b-a).slice(0,3).reduce((a,b)=>a+b,0),
    games: p.games
  })).sort((a,b)=>b.total-a.total);

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";
  displayList.forEach((p, i) => {
    const tr = document.createElement("tr");
    tr.className = `rank-${i+1}`;
    tr.onclick = () => showPlayer(p.name);
    tr.innerHTML = `<td>${i+1}</td><td>${p.name}</td><td>${p.total}</td><td>${p.games}</td>`;
    tbody.appendChild(tr);
  });

  document.getElementById("update-time").textContent = new Date().toLocaleTimeString();
}

loadLeaderboard();
setInterval(loadLeaderboard, 60000); // Sync every minute
</script>

</body>
</html>
