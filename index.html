<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏝️ Catan Leaderboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Poppins:wght@400;600;700&display=swap');

:root {
  --text:#fff5e1;
  --glass:rgba(255,255,255,0.12);
  --gold:#B8860B;
  --silver:#9C9C9C;
  --bronze:#CD7F32;
}

body {
  margin:0;
  font-family:'Poppins',sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

/* 🌄 background */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url('background.png') center/cover no-repeat;
  z-index:-3;
}

/* 🪵 board overlay */
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:url('catan.png') center/contain repeat;
  filter:blur(6px) brightness(0.6);
  z-index:-2;
}

/* 🌫 overlay */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

h1 {
  text-align:center;
  margin:40px 0 10px;
  font-family:'MedievalSharp',cursive;
  font-size:3rem;
}

#previous-season {
  text-align:center;
  margin-bottom:20px;
}

.leaderboard {
  width:90%;
  max-width:900px;
  margin:0 auto 50px;
  background:var(--glass);
  border-radius:20px;
  backdrop-filter:blur(15px);
  overflow:hidden;
}

table { width:100%; border-collapse:collapse; }
th,td { padding:14px; text-align:center; cursor:pointer; }

.rank-1 td { color:var(--gold); font-weight:700; }
.rank-2 td { color:var(--silver); }
.rank-3 td { color:var(--bronze); }

/* 👤 player panel */
#player-panel {
  position:fixed;
  right:20px;
  top:80px;
  width:280px;
  background:rgba(0,0,0,0.85);
  padding:15px;
  border-radius:15px;
  display:none;
}

footer { text-align:center; margin-bottom:20px; }

/* 📱 mobile */
@media (max-width:768px) {
  h1 { font-size:2rem; }

  .leaderboard { width:95%; }

  th,td { padding:10px; font-size:0.9rem; }

  #player-panel {
    width:90%;
    left:5%;
    right:auto;
    top:auto;
    bottom:20px;
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<h1>🏝️ Catan Leaderboard – April Season</h1>

<div id="previous-season"></div>

<div class="leaderboard">
  <table id="leaderboard-table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Score</th>
        <th>Games</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="player-panel"></div>

<footer>Last updated: <span id="update-time"></span></footer>

<script>

// 🔗 UPDATE THESE TWO LINKS
const APRIL_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2PbXFjzjLBgwjIMQiwXnynRhglLmTubZzm8nQG8nibfo3kJqiR-tucGdMCr6Rm-5KBhhrySF2oVB/pub?gid=1497877429&single=true&output=csv";
const NOVEMBER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2PbXFjzjLBgwjIMQiwXnynRhglLmTubZzm8nQG8nibfo3kJqiR-tucGdMCr6Rm-5KBhhrySF2oVB/pub?gid=0&single=true&output=csv";

// 🔁 fetch CSV
async function fetchCSV(url) {
  const res = await fetch(url + "&t=" + new Date().getTime());
  const text = await res.text();

  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h=>h.trim());
  const rows = lines.slice(1).map(r=>r.split(",").map(v=>v.trim()));

  return { headers, rows };
}

// 🏆 previous season
async function loadPreviousSeason() {
  const { headers, rows } = await fetchCSV(NOVEMBER_SHEET_URL);

  const nameIndex = headers.findIndex(h=>/name/i.test(h));
  const scoreIndex = headers.findIndex(h=>/score/i.test(h));

  const players = rows.map(r=>({
    name:r[nameIndex],
    score:parseFloat(r[scoreIndex])||0
  }));

  players.sort((a,b)=>b.score-a.score);
  return players;
}

// 🎯 placement
function getPlacementBonus(pos) {
  if (pos===1) return 3;
  if (pos===2) return 2;
  if (pos===3) return 1;
  return 0;
}

let playerStats = {};
let matches = {};

function getArchetype(p) {
  if (p.armyCount > p.roadCount && p.armyCount >= 2) return "⚔️ Warlord";
  if (p.roadCount > p.armyCount && p.roadCount >= 2) return "🚧 Road King";
  if (p.totalVP / p.games >= 8) return "🧱 Builder";
  return "🤝 Trader";
}

function showPlayer(name) {
  const p = playerStats[name];

  const winRate = ((p.wins/p.games)*100).toFixed(1);
  const avgVP = (p.totalVP/p.games).toFixed(1);
  const best = Math.max(...p.scores);

  const h2h = Object.entries(p.opponents)
    .map(([opp,rec])=>`${opp}: ${rec.wins}-${rec.losses}`)
    .join("<br>");

  const panel = document.getElementById("player-panel");

  panel.innerHTML = `
    <h3>${name}</h3>
    <p>${getArchetype(p)}</p>
    <p>Games: ${p.games}</p>
    <p>Win Rate: ${winRate}%</p>
    <p>Avg VP: ${avgVP}</p>
    <p>Best Score: ${best}</p>
    <p>🚧 ${p.roadCount} | 🛡 ${p.armyCount}</p>
    <p><strong>Head-to-Head:</strong><br>${h2h}</p>
    <button onclick="hidePanel()">Close</button>
  `;

  panel.style.display="block";
}

function hidePanel() {
  document.getElementById("player-panel").style.display="none";
}

// 🚀 main
async function loadLeaderboard() {

  const { headers, rows } = await fetchCSV(APRIL_SHEET_URL);

  const playersMap = {};
  playerStats = {};
  matches = {};

  rows.forEach(row => {
    const matchId = row[headers.indexOf("Match_ID")];
    const name = row[headers.indexOf("Player_Name")];
    const position = parseInt(row[headers.indexOf("Position")])||0;
    const vp = parseInt(row[headers.indexOf("VP")])||0;
    const road = parseInt(row[headers.indexOf("Longest_Road")])||0;
    const army = parseInt(row[headers.indexOf("Largest_Army")])||0;

    let total = vp + getPlacementBonus(position) + road + army;

    // 🎭 hidden bonus
    if (position===1 && road===0 && army===0) total+=2;

    // matches
    if (!matches[matchId]) matches[matchId]=[];
    matches[matchId].push({name,position,vp,road,army,total});

    // players map
    if (!playersMap[name]) playersMap[name]={name,scores:[],games:0};
    playersMap[name].scores.push(total);
    playersMap[name].games++;

  });

  // stats
  Object.values(matches).forEach(match=>{
    match.forEach(player=>{
      if (!playerStats[player.name]) {
        playerStats[player.name]={
          games:0,wins:0,totalVP:0,roadCount:0,armyCount:0,scores:[],opponents:{}
        };
      }

      const p = playerStats[player.name];
      p.games++;
      p.totalVP+=player.vp;
      p.scores.push(player.total);
      if (player.position===1) p.wins++;
      if (player.road) p.roadCount++;
      if (player.army) p.armyCount++;

      match.forEach(op=>{
        if (op.name!==player.name) {
          if (!p.opponents[op.name]) p.opponents[op.name]={wins:0,losses:0};
          if (player.position<op.position) p.opponents[op.name].wins++;
          else p.opponents[op.name].losses++;
        }
      });
    });
  });

  const players = Object.values(playersMap).map(p=>{
    const top = p.scores.sort((a,b)=>b-a).slice(0,5);
    return {
      name:p.name,
      totalScore:top.reduce((a,b)=>a+b,0),
      games:p.games
    };
  });

  players.sort((a,b)=>b.totalScore-a.totalScore);

  // previous
  const prev = await loadPreviousSeason();
  const winner = prev[0];
  const top3 = prev.slice(0,3);

  document.getElementById("previous-season").innerHTML = `
    <div style="font-size:1.3rem;">
      👑 <strong>Defending Champion:</strong> ${winner.name} (November – Catan)
    </div>
    <div style="opacity:0.8;">
      🥇 ${top3[0]?.name} | 🥈 ${top3[1]?.name} | 🥉 ${top3[2]?.name}
    </div>
  `;

  const tbody=document.querySelector("tbody");
  tbody.innerHTML="";

  players.forEach((p,i)=>{
    const rank=i+1;
    const badge=p.name===winner.name?"👑":"";

    const tr=document.createElement("tr");
    tr.className=`rank-${rank}`;
    tr.onclick=()=>showPlayer(p.name);

    tr.innerHTML=`
      <td>${rank}</td>
      <td>${p.name} ${badge}</td>
      <td>${p.totalScore}</td>
      <td>${p.games}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("update-time").textContent =
    new Date().toLocaleString();
}

loadLeaderboard();
setInterval(loadLeaderboard,30000);

</script>

</body>
</html>
