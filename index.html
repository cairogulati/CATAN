<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏝️ Catan Leaderboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Poppins:wght@400;600;700&display=swap');

:root {
  --bg1:#8B4513; --bg2:#C85A17; --bg3:#E9C46A; --bg4:#F4A261;
  --text:#fff5e1; --glass:rgba(255,255,255,0.12);
  --gold:#B8860B; --silver:#9C9C9C; --bronze:#CD7F32;
}

body {
  margin:0; font-family:'Poppins',sans-serif; color:var(--text);
  background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),var(--bg4));
  background-size:400% 400%; animation:gradientShift 20s ease infinite;
}

@keyframes gradientShift {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1 {
  text-align:center; margin:40px 0 10px;
  font-family:'MedievalSharp',cursive;
}

#previous-season {
  text-align:center;
  margin-bottom:20px;
}

.leaderboard {
  width:90%; max-width:900px;
  margin:0 auto 50px;
  background:var(--glass);
  border-radius:20px;
  backdrop-filter:blur(10px);
  overflow:hidden;
}

table { width:100%; border-collapse:collapse; }
th,td { padding:14px; text-align:center; }

.rank-1 td { color:var(--gold); font-weight:700; }
.rank-2 td { color:var(--silver); }
.rank-3 td { color:var(--bronze); }

footer { text-align:center; margin-bottom:20px; }
</style>
</head>

<body>

<h1>🏝️ Catan Leaderboard – April Season</h1>

<div id="previous-season"></div>

<div class="leaderboard">
  <table id="leaderboard-table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Score</th>
        <th>Games</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<footer>Last updated: <span id="update-time"></span></footer>

<script>

// 🔗 UPDATE THESE TWO LINKS
const APRIL_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2PbXFjzjLBgwjIMQiwXnynRhglLmTubZzm8nQG8nibfo3kJqiR-tucGdMCr6Rm-5KBhhrySF2oVB/pub?gid=1497877429&single=true&output=csv";
const NOVEMBER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2PbXFjzjLBgwjIMQiwXnynRhglLmTubZzm8nQG8nibfo3kJqiR-tucGdMCr6Rm-5KBhhrySF2oVB/pub?gid=0&single=true&output=csv";

// 🔁 Generic CSV fetcher
async function fetchCSV(url) {
  const res = await fetch(url + "&t=" + new Date().getTime());
  const text = await res.text();

  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());
  const rows = lines.slice(1).map(r => r.split(",").map(v => v.trim()));

  return { headers, rows };
}

// 🏆 Load previous season (November)
async function loadPreviousSeason() {
  const { headers, rows } = await fetchCSV(NOVEMBER_SHEET_URL);

  const nameIndex = headers.findIndex(h => /name/i.test(h));
  const scoreIndex = headers.findIndex(h => /score/i.test(h));

  const players = rows.map(row => ({
    name: row[nameIndex],
    score: parseFloat(row[scoreIndex]) || 0
  }));

  players.sort((a,b)=>b.score-a.score);
  return players;
}

// 🎯 Placement bonus
function getPlacementBonus(pos) {
  if (pos === 1) return 3;
  if (pos === 2) return 2;
  if (pos === 3) return 1;
  return 0;
}

// 🚀 Main loader
async function loadLeaderboard() {

  // 📊 Load April data
  const { headers, rows } = await fetchCSV(APRIL_SHEET_URL);

  const playersMap = {};

  rows.forEach(row => {
    const name = row[headers.indexOf("Player_Name")];
    const position = parseInt(row[headers.indexOf("Position")]) || 0;
    const vp = parseInt(row[headers.indexOf("VP")]) || 0;
    const road = parseInt(row[headers.indexOf("Longest_Road")]) || 0;
    const army = parseInt(row[headers.indexOf("Largest_Army")]) || 0;

    let total = vp + getPlacementBonus(position) + road + army;

    // 🎭 Hidden Pure Victory Bonus
    if (position === 1 && road === 0 && army === 0) {
      total += 2;
    }

    if (!playersMap[name]) {
      playersMap[name] = {
        name,
        scores: [],
        games: 0
      };
    }

    playersMap[name].scores.push(total);
    playersMap[name].games += 1;
  });

  // 🔥 Best 5 games logic
  const players = Object.values(playersMap).map(p => {
    const topScores = p.scores.sort((a,b)=>b-a).slice(0,5);
    const totalScore = topScores.reduce((a,b)=>a+b,0);

    return {
      name: p.name,
      totalScore,
      games: p.games
    };
  });

  players.sort((a,b)=>b.totalScore-a.totalScore);

  // 🏆 Load previous season
  const previousPlayers = await loadPreviousSeason();
  const previousWinner = previousPlayers[0];
  const top3 = previousPlayers.slice(0,3);

  // 🎨 Render previous season
  document.getElementById("previous-season").innerHTML = `
    <div style="font-size:1.3rem;">
      👑 <strong>Defending Champion:</strong> ${previousWinner.name} (November – Catan)
    </div>
    <div style="opacity:0.8;">
      🥇 ${top3[0]?.name} | 🥈 ${top3[1]?.name} | 🥉 ${top3[2]?.name}
    </div>
  `;

  // 🧾 Render leaderboard
  const tbody = document.querySelector("#leaderboard-table tbody");
  tbody.innerHTML = "";

  players.forEach((p, index) => {

    const rank = index + 1;
    const isChampion = p.name === previousWinner.name;
    const badge = isChampion ? "👑" : "";

    const tr = document.createElement("tr");
    tr.className = `rank-${rank}`;

    tr.innerHTML = `
      <td>${rank}</td>
      <td>${p.name} ${badge}</td>
      <td>${p.totalScore}</td>
      <td>${p.games}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("update-time").textContent =
    new Date().toLocaleString();
}

// 🔁 Auto refresh
loadLeaderboard();
setInterval(loadLeaderboard, 30000);

</script>

</body>
</html>
